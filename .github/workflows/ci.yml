# .github/workflows/ci.yml
name: ci

on:
  push:
    branches:
      - main
      - rewrite/**
  pull_request:
    branches:
      - main
      - rewrite/**

jobs:
  go:
    name: Go (lint + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy' locally."
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1
          golangci-lint --version

      - name: Install tools (templ, sqlc)
        run: just install-tools

      - name: Verify generated code is up to date
        run: |
          just gen
          if [ -n "$(git status --porcelain internal/store/sqlc/ internal/site/views/)" ]; then
            echo "Generated code is stale. Run 'just gen' locally and commit."
            git diff -- internal/store/sqlc/ internal/site/views/
            exit 1
          fi

      - name: Vet
        run: just vet

      - name: Lint
        run: just lint

      - name: Test
        run: just test

      - name: Build
        run: just build

      - name: Verify binary runs
        run: ./acai version

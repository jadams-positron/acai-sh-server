name: ${INSTANCE_NAME:-acai}

services:
    caddy:
        image: caddy:2.11
        restart: unless-stopped
        cap_add:
            - NET_ADMIN
        ports:
            - "127.0.0.1:${URL_PORT:-4000}:80"
            - "${HTTP_PORT_EXT:-80}:80"
            - "${HTTPS_PORT:-443}:443"
            - "${HTTPS_PORT:-443}:443/udp"
        volumes:
            - ./caddy/Caddyfile.${CADDYFILE:-prod}:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            acai:
                condition: service_healthy
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    memory: 128M
                reservations:
                    memory: 32M

    acai:
        image: ghcr.io/acai-sh/server:${IMAGE_TAG_VERSION:-latest}
        restart: unless-stopped
        pull_policy: always
        build:
            context: ..
            dockerfile: infra/Dockerfile
            target: runtime
        environment:
            DATABASE_PATH: /data/acai.db
            HTTP_PORT: 4000
            LOG_LEVEL: ${LOG_LEVEL:-info}
            SECRET_KEY_BASE: ${SECRET_KEY_BASE:?required}
            URL_HOST: ${URL_HOST:-app.acai.sh}
            URL_PORT: ${URL_PORT:-443}
            URL_SCHEME: ${URL_SCHEME:-https}
            MAIL_NOOP: ${MAIL_NOOP:-false}
            MAIL_FROM_NAME: ${MAIL_FROM_NAME:-acai.sh}
            MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-noreply@mg.acai.sh}
            MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
            MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
            MAILGUN_BASE_URL: ${MAILGUN_BASE_URL:-https://api.mailgun.net/v3}
            LITESTREAM_S3_BUCKET: ${LITESTREAM_S3_BUCKET:-}
            LITESTREAM_S3_REGION: ${LITESTREAM_S3_REGION:-}
            LITESTREAM_S3_ENDPOINT: ${LITESTREAM_S3_ENDPOINT:-}
            LITESTREAM_S3_PATH: ${LITESTREAM_S3_PATH:-}
            AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
            AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
        volumes:
            - acai_data:/data
        healthcheck:
            test: ["CMD", "/acai", "healthcheck"]
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 5s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: "1.0"
                    memory: 512M
                reservations:
                    memory: 256M

    devcontainer:
        build:
            context: ..
            dockerfile: infra/Dockerfile.dev
        environment:
            DATABASE_PATH: /data/acai.dev.db
            HTTP_PORT: 4000
            SECRET_KEY_BASE: UNSAFE_dev_secret_do_not_use_in_production_padding_xyz
            URL_HOST: localhost
            URL_PORT: 4000
            URL_SCHEME: http
            MAIL_NOOP: "true"
        volumes:
            - ..:/app
            - acai_dev_data:/data
        stdin_open: true
        tty: true
        user: dev
        profiles: ["dev"]

volumes:
    caddy_data:
    caddy_config:
    acai_data:
    acai_dev_data:

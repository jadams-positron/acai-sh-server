feature:
    name: data-model
    product: site
    description: |
        Core RDBMS schema for tracking AI-driven feature specifications and code implementation state.
        Fields are default required / non-null unless flagged as Optional.
        Foreign keys are default ON DELETE CASCADE unless flagged otherwise.
    prerequisites:
        - Default elixir/phoenix app already has Users table, session tokens, and mailer logic completed.

components:
    TEAMS:
        name: teams table
        description: Top-level tenant for RBAC and billing.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: name field is a case-insensitive string, non-nullable, and unique within the entire teams table.
            2-1: name field only supports alphanumeric chars, hyphens, and underscores.
            3: global_admin is a boolean field.
            3-1: global_admin defaults to false.

    PRODUCTS:
        name: products table
        description: First-class product entity representing a collection of features. Implementations span all features within a product.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: team_id is a Foreign Key to teams table.
            3: name field is a CITEXT column, non-nullable.
            3-1: name field only supports alphanumeric chars, hyphens, and underscores.
            4: description is a text field. Optional.
            5: is_active is a boolean to handle soft-deletes. Defaults to true.
            6: Composite Unique Constraint enforces (team_id, name).

    TOKENS:
        name: access_tokens table
        description: Cryptographically hashed tokens granting scoped API access to the team, via a user.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: user_id is a Foreign Key to users table.
            3: name is a string, used for identifying the token's purpose.
            4: token_hash is a string storing the SHA-256 hash of the raw token.
            4-1: token_hash has a UNIQUE constraint, which serves as its index.
            5: token_prefix is a string storing the unhashed prefix.
            6: scopes is a non-null JSONB array of strings defining the permitted API actions.
            6-1: Default new token scopes are assigned by application code on creation; the migration does not define a database default. Standard defaults are specs:read, specs:write, states:read, states:write, refs:read, refs:write, impls:read, impls:write, team:read.
            7: expires_at is a timestamp indicating when the token naturally invalidates. Optional.
            8: revoked_at is a timestamp for manual, soft-delete invalidation. Optional.
            9: last_used_at is a timestamp updated on successful authentication to track stale tokens. Optional.
            10: team_id is a Foreign Key to teams table.
            10-1: Index on (team_id) for team-scoped token queries.

    ROLES:
        name: user_team_roles table
        description: A pure join table with no primary key. Unique constraint on (team_id, user_id) prevents duplicate role assignments.
        requirements:
            1: team_id is a Foreign Key to teams table.
            2: user_id is a Foreign Key to users table.
            2-1: Index on (user_id) for user-to-team membership lookups.
            3: title field is a non-nullable string.
            4: Composite Unique Constraint enforces (team_id, user_id).

    IMPLS:
        name: implementations table
        description: |
            A product-wide environment defined by a set of tracked branches.
            Implementations encompass the state of all features within a product and can inherit from a parent implementation.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: product_id is a Foreign Key to products table.
            3: name is a string, typically derived from the branch name during auto-creation.
            4: description is a text field. Optional.
            5: is_active is a boolean to handle soft-deletes. Defaults to true.
            6: team_id is a Foreign Key to teams table.
            6-1: Index on (team_id) for team-scoped implementation queries.
            7: parent_implementation_id is a Foreign Key to implementations table (self-referential). Optional.
            7-1: parent_implementation_id uses ON DELETE SET NULL to preserve child implementations if parent is deleted.
            8: Composite Unique Constraint enforces (product_id, name).

    BRANCHES:
        name: branches table
        description: |
            Stores unique repository branches with stable IDs.
            A branch is identified by its team + repo_uri + branch_name combination.
            This allows branch metadata (like name) to be updated without breaking references.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: repo_uri is the normalized URI (e.g., github.com/org/repo).
            3: branch_name is a string (e.g., main, dev, feature-x).
            4: last_seen_commit is a string storing the commit hash from the most recent CLI push for this branch.
            5: Index on (repo_uri) for listing branches by repository.
            6: team_id is a Foreign Key to teams table, non-nullable.
            6-1: Composite Unique Constraint enforces (team_id, repo_uri, branch_name) - each branch is unique within a team.

    TRACKED_BRANCHES:
        name: tracked_branches table
        description: |
            A junction table linking implementations to branches they track.
            One implementation can track multiple branches across repos.
            This is a many-to-many relationship between implementations and branches.
        requirements:
            1: implementation_id is a Foreign Key to implementations table, non-nullable.
            2: branch_id is a Foreign Key to branches table, non-nullable.
            2-1: Index on (branch_id) for branch-scoped tracking queries.
            3: Composite Primary Key on (implementation_id, branch_id).
            4: Composite Unique Constraint enforces (implementation_id, repo_uri) - an implementation may not track two branches in the same repo.
            5: repo_uri is the normalized URI, denormalized from branches table for the unique constraint.

    SPECS:
        name: specs table
        description: |
            A stored feature.yaml file at a specific repo + branch + path.
            Requirements are stored as JSONB rather than a separate table for simplicity.
            Specs belong to a product (not directly to a team) since products already define team ownership.
            A spec belongs to exactly one branch, but a branch can have many specs.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: product_id is a Foreign Key to products table, non-nullable.
            3: branch_id is a Foreign Key to branches table, non-nullable.
            4: path is text starting from the repo root without a leading slash (e.g., features/auth.feature.yaml). Optional.
            4-1: path is metadata only and not part of spec identity.
            5: last_seen_commit is a string storing the commit hash from the most recent CLI push.
            6: parsed_at is a timestamp of the most recent parse.
            7: feature_name is the string defined under feature.name.
            7-1: feature_name field only supports alphanumeric chars, hyphens, and underscores.
            8: feature_description is the string defined under feature.description. Optional.
            9: feature_version is the string defined under feature.version. Defaults to 1.0.0.
            9-1: If present, feature_version must follow SemVer format (server enforced)
            10: raw_content is a text field storing the original feature.yaml contents. Optional.
            11: requirements is a JSONB column storing parsed requirement definitions keyed by requirement ID.
            11-1: Each requirement ID key maps to an object containing definition (string), note (string, optional), is_deprecated (boolean, defaults to false), replaced_by (array of requirement ID strings, defaults to empty).
            12: Composite Unique Constraint enforces (branch_id, product_id, feature_name) - one spec per feature per product on a branch.
            13: Index on (product_id) for listing specs by product.
            14: Index on (branch_id) for joining specs to branches.

    FEATURE_IMPL_STATES:
        name: feature_impl_states table
        description: |
            Stores requirement states for a specific feature/implementation pair, stored as JSONB.
            Keyed by feature_name (not spec_id) to allow states to exist without a local spec file.
            This enables pushing states from a backend repo for a feature whose spec lives in the frontend repo.
            States are keyed by full requirement ID (e.g., my-feature.MY_COMPONENT.1-1).
            Orphaned states (requirement IDs removed from a spec) are retained for potential reinstatement.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: implementation_id is a Foreign Key to implementations table.
            3: feature_name is a string matching the feature.name from the spec file (the requirement ID prefix).
            3-1: feature_name field only supports alphanumeric chars, hyphens, and underscores.
            4: states is a JSONB column storing requirement statuses.
            4-1: states format is an object keyed by full requirement ID string.
            4-2: Each requirement ID entry contains status (string), comment (string, optional), metadata (object, optional), updated_at (timestamp).
            4-3: Valid status values are `null`, `"assigned"`, `"blocked"`, `"incomplete"`, `"completed"`, `"rejected"`, or `"accepted"`.
            5: Composite Unique Constraint enforces (implementation_id, feature_name).
            6: GIN Index on (states) for querying by requirement ID key within the JSONB.
            7: Index on (implementation_id) for listing all features for an implementation.

    FEATURE_BRANCH_REFS:
        name: feature_branch_refs table
        description: |
            Stores code references linking requirement IDs to file locations in the codebase, scoped to a branch.
            Keyed by feature_name (not spec_id) to allow code references to exist without a local spec file.
            This enables pushing code references from a backend repo for a feature whose spec lives in the frontend repo.
            Code references belong to branches (not implementations) because they represent file locations at a specific commit on a branch.
            The dashboard aggregates code references across an implementation's tracked branches.
            Pushed exclusively by CLI.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: branch_id is a Foreign Key to branches table.
            3: feature_name is a string matching the feature.name from the spec file (the requirement ID prefix).
            3-1: feature_name field only supports alphanumeric chars, hyphens, and underscores.
            4: refs is a JSONB column storing code references keyed by requirement ID.
            4-1: refs format is an object keyed by full requirement ID string.
            4-2: Each requirement ID entry contains an array of reference objects.
            4-3: Each reference object contains path (string, e.g. lib/foo.ex:102), is_test (boolean).
            5: commit is a string storing the commit hash when code references were pushed.
            6: pushed_at is a timestamp of when the code references were pushed.
            7: Composite Unique Constraint enforces (branch_id, feature_name).
            7-note: feature_branch_refs are product-blind; same feature_name on the same branch shares one refs bucket across products.
            8: GIN Index on (refs) for querying by requirement ID key within the JSONB.
            9: Index on (branch_id) for listing all features for a branch.

constraints:
    FIELDS:
        requirements:
            1: All tables defined by this spec include created_at and updated_at timestamps managed by Ecto.
            2: All entities, except for roles, use `id` primary key UUID columns populated by the application as UUIDv7 values.

    SPEC_IDENTITY:
        name: Spec identity and update semantics
        requirements:
            1: Spec id is stable across updates on the same (branch_id, product_id, feature_name) combination.
            2: Pushing an updated feature.yaml to an existing branch updates the existing spec row if product_id and feature_name match.
            3: Renaming a feature creates a new spec; the old spec and its states remain under the old feature_name.
            4: Version changes on an existing spec update the spec row but do not create a new spec.
            5: Branch id is stable even if branch_name changes, allowing branch renames without breaking spec references.
            6: Same feature_name may exist in multiple products on the same branch as distinct spec rows.
            7: feature_branch_refs remain keyed only by (branch_id, feature_name), so same-name features across products share refs on that branch by design.

    IMPL_CREATION:
        name: Implementation creation
        description: |
            Describes how implementations are created during a push.
            Implementations are usually created from pushed specs, but may also be created from refs-only pushes when the request provides explicit product and parent information.
            There is no auto-inheritance for MVP. Parent must be explicitly specified.
        requirements:
            1: When CLI pushes specs to an untracked branch, the server auto-creates an implementation.
            2: Implementation name defaults to the branch name being pushed.
            3: CLI may provide explicit --parent-impl flag to set parent at creation time. --parent-branch is deferred post-MVP.
            4: A refs-only push may create a new child implementation when product, target implementation name, and parent implementation name are all provided.

    INHERITANCE:
        name: Implementation inheritance semantics
        requirements:
            1: Inheritance forms a chain via parent_implementation_id for querying specs across implementations.
            2: When querying states for an implementation, states are read from feature_impl_states for that implementation, walking up the parent chain if not found.
            3: If a spec exists on both parent and child implementation's tracked branches, child's spec takes precedence.
            4: If a spec only exists on a parent implementation's tracked branch, states inherit from parent.
            5: Inheritance recurses up the chain with worst case depth of 3 to 4 levels (e.g., prod to dev to feature to task).
            6: States are snapshotted from parent on first push for a given (feature_name, implementation). After snapshot, parent changes do not affect the child.
            7: Push operations create or update feature_impl_states keyed by feature_name, not spec_id.
            8: When querying code references for an implementation, the system aggregates feature_branch_refs across all tracked branches, walking up the parent chain's tracked branches if not found.
            9: feature_name-based keys allow code references and states to exist for features whose spec lives in a different repo (monorepo support).

    PRUNING:
        name: Automatic pruning of code-derived data
        requirements:
            1: When a branch loses its last tracked_branches link, the system prunes the branch automatically.
            2: Pruning a branch also removes its branch-scoped specs and feature_branch_refs through cascading deletes.
            3: When a spec's branch still exists but no implementation in that spec's product tracks the branch anymore, the system prunes that spec automatically.
            4: feature_impl_states are not auto-pruned by branch or spec pruning because they contain implementation-specific annotations that may not be recoverable from code.

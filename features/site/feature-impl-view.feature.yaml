feature:
    name: feature-impl-view
    product: site
    description: View for a single feature within a specific implementation. e.g. ""
    prerequisites:
        - data-model.SPECS
        - data-model.IMPLS
        - data-model.FEATURE_IMPL_STATES
        - data-model.FEATURE_BRANCH_REFS
        - feature-view

components:
    MAIN:
        requirements:
            1: Renders a 'Feature Settings' button
            1-1: On click, toggles the feature-settings drawer (see feature-settings.feature.yaml)
            2: Renders an 'Implementation Settings' button
            2-1: On click, toggles the impl-settings drawer (see impl-settings.feature.yaml)

    CARDS:
        name: Info cards and header content
        requirements:
            1: Renders an interactive title header "<impl-name> implementation of the <feature-name> feature"
            1-1: The impl name and feature name are interactive dropdowns
            1-2: On change, the implementation or feature is patch-navigated (not a full page reload) and url + nav reflects the new state
            1-3: The feature dropdown only lists features that resolve for the selected implementation within the current product, including features inherited from ancestor implementations.
            1-4: The implementation dropdown only lists implementations that resolve the current feature within the current product, including implementations that inherit the feature from ancestor implementations.
            2: Renders a 'target-spec' card
            2-1: Indicates which spec is being referenced - the repo_uri, branch, and path, with labels.
            2-2: For known repo URI patterns (GitHub, GitLab), displays only the repository name
            2-3: Known patterns include GitHub and GitLab URIs
            2-4: For unknown URI patterns, displays the full repo_uri unchanged
            2-5: Indicates with a badge if the spec is inherited or is local
            2-5-note: inherited means; not pushed to a tracked branch, but found in an ancestor's. Local means; directly pushed to this implementation's tracked branch. There is only ever 1 canonical spec from this view.
            3: Renders a 'tracked-branches' card that lists every tracked branch name
            4: Renders the feature description from the target spec

    LIST:
        name: List of requirements
        requirements:
            1: Renders requirements list
            2: Table columns are ACID, Status, Definition, Refs count.
            2-1: Renders the next nearest ancestor implementation's requirements if none exists for this impl.
            2-2: The table columns are sortable.
            2-3: The active table sort order is mirrored by the requirement coverage chip order and the test coverage chip order.
            2-4: The ACID column displays the suffix only, omitting the shared feature prefix, and uses a compact width.
            3: Status column shows state of this implementation, or of the inherited implementation.
            3-1: On click, the status chip opens a dropdown that renders a list of status options.
            3-2: Selecting a state from the list will apply it
            3-3: Selecting the existing state (if it has one) or deselecting (clicking off the dropdown) will avoid applying a new state.
            4: Refs column shows total number of code references across all tracked branches for this implementation.
            5: Clicking a row opens the requirement details drawer for that ACID.

    DRAWER:
        name: Requirement details drawer
        requirements:
            1: Opens when a requirement row is clicked.
            2: Shows ACID as title, full definition text, and note if present.
            3: Shows status and comment from feature_impl_states.states for this ACID.
            3-1: The status control renders the same dropdown as the table Status column.
            3-2: The dropdown has the same behavior as the table Status column, including apply and no-op behavior.
            3-3: Within the requirement details drawer, the status dropdown opens downward.
            4: Lists all refs from feature_branch_refs.refs for this ACID, aggregated across all tracked branches for this implementation.
            4-note: Each ref is sourced from a specific branch. Consider showing which branch each ref comes from.
            5: Each ref renders as clickable link to source file at the specific line.
            6: Test refs visually distinguished from non-test refs.
            7: Drawer dismisses without navigation.

constraints:
    ROUTING:
        requirements:
            1: Route is /t/:team_name/i/:impl_name-:impl_id/f/:feature_name.
            2: impl_name is sanitized and trimmed for URL safety.
            3: impl_id is the UUID used for lookup.
            4: feature_name matches spec.feature_name scoped to implementation tracked branches.

    INHERITANCE:
        requirements:
            1: If feature spec is not found on the implementation's tracked branches, recurse up parent_implementation_id chain to find nearest
            2: States are read from feature_impl_states for this implementation. If not found, walk parent chain.
            3: Refs are aggregated from feature_branch_refs across all tracked branches for this implementation. If not found, walk parent chain's tracked branches.

feature:
    name: feature-view
    key: FEATURE_VIEW
    product: site
    description: Implementation selector view for a feature. Shows cards for each implementation across products.
    prerequisites:
        - data-model.SPECS
        - data-model.IMPLS
        - data-model.FEATURE_IMPL_STATES
        - product-view

components:
    MAIN:
        name: Feature overview
        requirements:
            1: Renders feature name and description from the spec.
            2: Renders implementation cards for each active implementation of this product.
            3: Each card shows implementation name, number of requirements (from the spec this implementation uses, considering inheritance), and a progress bar colored and segmented by status, e.g. if 50% are "accepted" the bar is 50% green.
            4: Each card links to /t/:team_name/i/:impl_name-:impl_id/f/:feature_name.
            5: Empty state shown if no implementations exist.

    HIERARCHY:
        name: Implementation hierarchy display
        requirements:
            1: Cards are ordered by inheritance depth, with parent implementations appearing before their children.
            2: Cards are grouped by parent-child relationships, maintaining the tree structure in the display order.
            3: Hierarchy supports nesting up to a maximum depth of 4 (parent, child, grandchild, great-grandchild).
            4: Implementations beyond depth 4 are displayed as siblings at depth 4 (flattened).

constraints:
    ROUTING:
        requirements:
            1: Route is /t/:team_name/f/:feature_name.
            2: feature_name matches spec.feature_name scoped to teams tracked branches.

    ENG:
        requirements:
            1: Single query fetches all specs, implementations, and state counts for the feature.
            2: Respects inheritence semantics where if an implementation lacks a spec or states, it is inherited from the ancestor tree

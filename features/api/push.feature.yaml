feature:
    name: push
    product: api
    description: |
        The push endpoint is the primary write API for the acai CLI.
        It ingests multiple specs, code references, and git metadata in a single json payload.
        It can be used to update existing product implementations (for example, updates to Production when specs change or code has been refactored).
        It can also be used to create a new implementation, with inheritance semantics (for example, when branching from Staging to work on a new spec or fix an existing one).
    version: 1.0.0

components:
    ENDPOINT:
        description: HTTP interface
        requirements:
            1: "POST /api/v1/push"
            2: Content-Type application/json
            3: Requires Authorization Bearer token header

    REQUEST:
        description: Describes the top level request body shape
        requirements:
            1: Requires `repo_uri` string
            2: Requires `branch_name` string
            3: Requires `commit_hash` string
            3-note: Used to update the branch record's `last_seen_commit` field
            4: Accepts optional `specs` list of spec objects
            4-note: "Example - `[{ feature, requirements, meta }, { feature, requirements, meta }]`"
            4-1: Each requires `feature` object (see FEAT)
            4-2: Each requires `requirements` object (see SPEC_REQS)
            4-3: Each requires `meta` object (see FEAT_META)
            5: Accepts optional `references` map (see REFS)
            7: Accepts optional `target_impl_name` string
            7-note: When provided, all specs in the push must belong to the same product as the target implementation. Resolved within the request product, which comes from pushed specs when present or `product_name` when specs are absent.
            8: Accepts optional `parent_impl_name` string
            8-note: When provided, all specs in the push must belong to the same product as the parent implementation. Resolved within the request product, which comes from pushed specs when present or `product_name` when specs are absent.
            9: Accepts optional `product_name` string
            9-note: Required for refs-only pushes that create or link an implementation because refs do not identify a product.
            10: If `specs` contains the same `feature.name` more than once, the push is rejected

    FEAT:
        description: The shape of the `feature` object contained in a spec object
        requirements:
            1: Requires `name` string
            2: Requires `product` string
            3: Accepts optional `description` string
            4: Accepts optional `version` string, defaults to "1.0.0"
            5: Accepts optional `prerequisites` list of strings
            5-note: Prerequisites are persisted only via raw_content and are not stored as a dedicated column.

    FEAT_META:
        description: The shape of the `meta` object contained in a spec object
        requirements:
            1: Requires `path` string (path from repo root, e.g. features/auth.feature.yaml)
            2: Accepts optional `raw_content` string
            3: Requires `last_seen_commit` string
            3-note: The commit hash where this spec file was last modified. May differ from the top-level `commit_hash` if the spec file hasn't changed since an older commit.

    SPEC_REQS:
        description: The `requirements` object contained in a spec object (see REQUEST)
        requirements:
            1: Contains a map of ACIDs to Definition objects. Each definition object contains...
            1-1: Required `requirement` string
            1-2: Optional `deprecated` boolean
            1-3: Optional `note` string
            1-4: Optional `replaced_by` list of strings

    REFS:
        description: The `references` top level property. Refs are stored per feature + branch (not per implementation) since they represent file locations at a specific branch.
        requirements:
            1: Accepts optional `override` boolean, default false, which indicates if the refs should override rather than merge
            1-note:
                Default false because we assume the push was partial (only some refs from some files on the branch).
                In the db we store refs in buckets, grouped by feature + branch. `true` would reset any bucket that is touched.
            2: Requires `data` object
            2-1: |
                `data` contains a map of ACIDs to ref arrays e.g. `{ "my-feature.MAIN.1-1": [{ path: "lib/foo.ex:102", is_test: false }] }`
            2-2: Each ref object requires a `path` string, and optional `is_test` boolean (default false)
            3: Refs can contain any ACID for any feature, including non-existent features, and they are always persisted as long as the format is valid
            3-note: This permissiveness allows pushing refs from repos that don't contain the spec file. Unknown ACIDs are not skipped or reported as errors.
            4: Refs can be pushed independently of specs (common in multi-repo setups)
            5: When override is false, incoming refs replace existing refs per-ACID key; untouched ACIDs in the existing bucket are preserved
            6: When override is true, all existing refs for each touched feature + branch bucket are replaced entirely
            7: A refs-only push to an untracked branch is allowed without creating or linking an implementation unless the request also satisfies NEW_IMPLS.6 or LINK_IMPLS.1

    RESPONSE:
        description: The response shape for successful and failed pushes
        requirements:
            1: "On success, returns HTTP 200 with a JSON body containing a `data` object"
            2: "The `data` object includes: `implementation_name` (string, nullable), `implementation_id` (string, nullable), `product_name` (string, nullable), `branch_id` (string)"
            2-note: Implementation and product fields are null when the push did not involve an implementation (e.g. refs-only push to an untracked branch).
            3: "The `data` object includes `specs_created` (integer) and `specs_updated` (integer) counts"
            3-note: Both counts may be zero on idempotent re-pushes where spec content is unchanged.
            4: "The `data` object includes a `warnings` list of human-readable strings for non-fatal issues"
            5: "On validation error, returns HTTP 422 with an `errors` object containing a `detail` string"
            5-1: "Requests that exceed configured semantic caps are validation errors and return HTTP 422"
            6: "On auth error, returns HTTP 401 with an `errors` object containing a `detail` string"
            7: "On scope/permission error, returns HTTP 403 with an `errors` object containing a `detail` string"
            8: "On oversized request body, returns HTTP 413 with an `errors` object containing a `detail` string"
            9: "When the push rate limit is exceeded, returns HTTP 429 with an `errors` object containing a `detail` string"

    INSERT_SPEC:
        description: When new spec records are created
        requirements:
            1: Inserts a new spec record when it is the first time that feature_name has been pushed for this product from this branch
            2: On feature name clash within the same branch, performs an update instead (see UPDATE_SPEC)
            2-note: This means INSERT_SPEC and UPDATE_SPEC are mutually exclusive based on whether (branch_id, product_id, feature_name) already exists

    UPDATE_SPEC:
        description: When existing spec records are updated
        requirements:
            1: Updates an existing spec record when this branch already has a spec with this product_id and feature_name
            2: Accepts changes to version, path, description, raw_content, and requirements
            3: The requirements map is always overwritten completely, never merged with the previous version

    WRITE_REFS:
        description: When refs are written
        requirements:
            1: Refs are grouped by feature_name (derived from the ACID prefix) and written to feature_branch_ref rows keyed by (branch_id, feature_name)
            2: The system silently allows dangling refs (e.g. ACIDs that don't map to an actual spec)
            3: Refs are written to the branch even if the branch is not tracked by any implementation
            4: The top-level commit_hash is stored on each feature_branch_ref record as the commit field
            5: Split pushes for same-name features in different products keep separate spec rows but share the same refs bucket on that branch

    PERMANENCE:
        description: Semantics for what can be undone and what can not
        requirements:
            1: If I accidentally overwrite a spec (e.g. if I accidentally copy paste a feature name), related refs are not destroyed
            2: Ref overwrites and deletions are permanent and do not have any explicit undo semantics
            2-note: For refs and specs you can just re-push since they are derived from your codebase

    NEW_IMPLS:
        description: |
            Semantics for when implementations (and products) are created.
            The push request always targets exactly one product.
            That product comes from pushed specs when specs are present, or from `product_name` when specs are absent.
            To keep this simple for MVP, re-linking, changing inheritance, and other mutations are done via the frontend only.
            There is no auto-inheritance for MVP -- it must be specified.
        requirements:
            1: Creates a new implementation when specs are pushed, and the branch is not yet tracked by any implementation
            1-1: Names the implementation after the `target_impl_name`, falling back to `branch_name`
            1-note: Exception for linking when the target_impl_name resolves to an existing implementation in the same product (see LINK_IMPLS)
            3: Creates a new `product` record for each spec that contains a never-before-seen `feature.product` value
            4: Rejects the push if specs span multiple products
            4-note: The CLI should split multi-product pushes into separate requests, one per product
            5: Implementation names are scoped to a product. If the auto-generated name (from branch_name) collides with an existing implementation in the same product, the push is rejected with a helpful error suggesting the user provide a `target_impl_name`
            6: Creates a new implementation from a refs-only push when the branch is not yet tracked by any implementation and `product_name`, `target_impl_name`, and `parent_impl_name` are all provided
            6-1: A refs-only implementation creation always creates a new child implementation and never links the branch to an existing implementation
            6-2: The new child implementation belongs to `product_name` and inherits from `parent_impl_name`
            7: A refs-only push to an untracked branch does not create an implementation unless it satisfies 6

    LINK_IMPLS:
        description: |
            In some cases we can safely link an untracked branch to an existing implementation (to insert a tracked_branches record).
            This is a different workflow from branching off an implementation, in which case I would want a new child implementation.
            This is useful if I've spun up a new repo (backend, microservice, etc) and am integrating it into a product for the first time.
        requirements:
            1: |
                A branch is linked to an existing implementation only when all of the following are true;
                1. the branch is not already tracked by any implementation
                2. the request product is known from pushed specs or explicit `product_name`
                3. the `target_impl_name` matches an existing implementation within that product
                4. that implementation does not already track a branch in this `repo_uri`
                5. `parent_impl_name` is not provided
            2: On successful link, specs and refs are written to the linked implementation as normal
            3: If `target_impl_name` matches an existing implementation but that implementation already tracks a branch in this repo_uri, the push is rejected with a helpful error
            4: If `parent_impl_name` is provided for an untracked branch, the push never links to an existing implementation and instead follows the new child implementation rules in NEW_IMPLS
            5: If an untracked refs-only push provides `product_name` and `target_impl_name` but does not satisfy 1, the push is rejected unless it satisfies NEW_IMPLS.6

    EXISTING_IMPLS:
        description: In most cases the branch is already tracked by one or more implementations
        requirements:
            1: When the branch is already tracked by one implementation, specs and refs are written to that branch as normal
            2: If the branch is tracked by multiple implementations and the request needs an implementation context, `target_impl_name` is required
            2-note: An implementation context is needed for implementation-scoped behavior such as the response implementation fields or validating `parent_impl_name`
            3: If the branch is tracked by multiple implementations and `target_impl_name` is provided, the push resolves the implementation context to that implementation only
            4: If the branch is already tracked by implementation X and `target_impl_name` resolves to a different implementation Y, the push is rejected with a helpful error
            4-note: This prevents accidentally pushing to the wrong implementation. To re-link a branch, use the frontend.

    PARENTS:
        description: |
            The user can create a new implementation that inherits from a parent.
            For MVP, parent can only be set at creation time. Updating an existing implementation's parent is done via the frontend only.
        requirements:
            1: If a push creates a new implementation (see NEW_IMPLS), the user can provide a `parent_impl_name` to configure inheritance
            1-note: The parent_impl_name is resolved within the request product, which comes from pushed specs when present or `product_name` when specs are absent
            2: If `parent_impl_name` is not provided, new implementations will not inherit (there is no auto-inheritance heuristic)
            3: If `parent_impl_name` is provided but does not resolve to an existing implementation within the same product, the push is rejected with a helpful error

    IDEMPOTENCY:
        name: Push idempotency
        description: |
            Push operations are idempotent - re-running the same push produces the same result.
            Different pushes to the same implementation compose predictably.
        requirements:
            1: Pushing the same spec content multiple times is a no-op after the first
            2: Pushing with inheritance, then pushing without inheritance, keeps the parent unchanged (parent is immutable via push after creation)
            4: Forgotten refs can be added in subsequent pushes via the references map
            5: If the branch is already tracked by an implementation and a different parent_impl_name is provided, reject with an error explaining that parent cannot be changed via push.
            5-1: If the parent name matches, do nothing (idempotent / duplicate request case).
            6: Re-pushing the same refs-only payload to an untracked branch without implementation-creation inputs leaves the branch untracked

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: Push requires a valid, non-expired, non-revoked API token
            2: Token scopes must include specs:write for spec pushes
            3: Token scopes must include refs:write for reference pushes
            4: Token scopes must include impls:write for creating or linking implementations
            6: The token's team_id determines ownership of all created resources
            7: All implementation, product, and branch lookups are scoped to the token's team_id

    TX:
        name: Transaction guarantees
        requirements:
            1: All operations within a push are atomic; any failure rolls back the entire push
            1-note: Any rejection causes nothing to be written — including refs and specs.
            2: Concurrent pushes to the same branch and implementation context use last-write-wins semantics

    VALIDATION:
        name: Validation constraints
        requirements:
            1: Feature names must only contain alphanumeric chars, hyphens, and underscores
            2: Version strings must follow SemVer format when provided
            3: If `target_impl_name` is provided, all specs must belong to the same product as the target implementation
            4: If `parent_impl_name` is provided, all specs must belong to the same product as the parent implementation
            5: Implementation names are unique within a product (scoped to product_id, not team-wide)
            6: If specs are present and `product_name` is also provided, `product_name` must match the shared `feature.product` value from the pushed specs
            7: A refs-only push that creates or links an implementation requires explicit `product_name`
            8: A refs-only push that creates a new child implementation requires explicit `target_impl_name` and `parent_impl_name`
            9: If a refs-only push to an untracked branch provides any of `product_name`, `target_impl_name`, or `parent_impl_name`, the combination must satisfy either NEW_IMPLS.6 or LINK_IMPLS.1

    ABUSE:
        name: Abuse protection and operational limits
        requirements:
            1: The push endpoint rejects request bodies that exceed a configured maximum byte size
            1-1: Oversized request bodies return HTTP 413 before any push data is written
            2: The push endpoint rejects requests that exceed configured semantic caps with a helpful HTTP 422 error
            2-1: The default maximum number of specs per push is 100
            2-2: The default maximum number of reference entries per push is 10000
            2-3: The default maximum number of requirements in one spec is 200
            2-4: The default maximum length of `meta.raw_content` is 100 KB
            2-5: The default maximum length of one requirement string is 2000 characters
            2-6: The default maximum length of one feature description string is 5000 characters
            2-7: The default maximum length of `meta.path` is 1024 characters
            2-8: The default maximum length of `repo_uri` is 2048 characters
            3: Request body and semantic caps are configurable by environment
            4: The push endpoint is rate-limited per access token
            4-1: Requests that exceed the configured push rate limit return HTTP 429
            4-2: The push rate limit is configurable by environment
            5: Rejected abuse attempts are emitted as structured application logs
            5-1: Abuse rejection logs include a safe summary of the request such as `request_id`, endpoint, rejection reason, request size, and payload counts when known
            5-2: Abuse rejection logs include `team_id` and a non-secret token identifier when authentication has already succeeded
            5-3: Abuse rejection logs never include the raw bearer token or full push payload
